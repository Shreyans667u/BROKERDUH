# BROKERDUH broker config
# Two listeners: raw MQTT for devices (ESP32/ESP8266), WebSocket for the browser dashboard.

# Raw MQTT — used by ESP32/ESP8266 firmware (PubSubClient etc.)
listener 1883
protocol mqtt

# MQTT over WebSocket — used by index.html in the browser (mqtt.js can only speak WS, not raw TCP)
listener 9001
protocol websockets

# For local dev only. For anything beyond your own network, add a password file
# and TLS certs, then replace the two lines below with:
#   allow_anonymous false
#   password_file /mosquitto/config/passwd
allow_anonymous true

persistence true
persistence_location /mosquitto/data/
log_dest stdout
